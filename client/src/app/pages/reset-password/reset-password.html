<div class="flex justify-center items-center h-full bg-bg-primary text-text-primary p-6">
    <div class="bg-bg-elevated rounded-xl p-12 shadow-lg w-full max-w-xl">
        <div class="flex flex-col gap-5">

            <h1 class="text-3xl font-bold text-center">
                Setup New Password
            </h1>

            @if (validationErrors().length > 0) {
                <div class="bg-red-500/10 border border-red-500 rounded-lg p-3">
                    <ul class="list-disc list-inside text-red-500 text-sm space-y-1">
                        @for (error of validationErrors(); track error) {
                            <li>{{ error }}</li>
                        }
                    </ul>
                </div>
            }

            @if (failMessage()) {
                <div class="bg-red-500/10 border border-red-500 rounded-lg p-3">
                    <p class="text-red-500 text-sm">
                        {{ failMessage() }}
                    </p>
                </div>
            }

            <form
                class="flex flex-col gap-5"
                [formGroup]="form"
                (ngSubmit)="resetPassword($event)"
            >

                <input
                    class="drawer-input w-full"
                    type="email"
                    formControlName="emailAddress"
                    placeholder="Email Address"
                    readonly
                >

                <input
                    class="drawer-input w-full"
                    type="password"
                    formControlName="password"
                    placeholder="New Password"
                >

                <input
                    class="drawer-input w-full"
                    type="password"
                    formControlName="confirmPassword"
                    placeholder="Confirm New Password"
                >

                <app-submit-button
                    class="w-full"
                    [text]="'Submit'"
                    [loading]="loading()">
                </app-submit-button>

            </form>

        </div>
    </div>
</div>
