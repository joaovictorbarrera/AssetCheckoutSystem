<div class="flex justify-center text-lg h-full items-center bg-bg-primary text-text-primary">
    <div class="bg-bg-elevated rounded-xl p-12 h-100 flex items-center shadow-lg">
        <div class="flex flex-col gap-5">
            <h1 class="text-3xl font-bold text-center">Login</h1>
            @if (this.failMessage()) {
                <div class="bg-red-500/10 border border-red-500 rounded-lg p-3">
                    <p class="text-red-500 text-sm">
                        {{ failMessage() }}
                    </p>
                </div>
            }
            <form class="flex flex-col gap-5 items-start" (submit)="login($event)">
                <input
                    class="w-100 dark-input"
                    [(ngModel)]="emailAddress"
                    type="email"
                    name="emailAddress"
                    placeholder="Email Address"
                >

                <input
                    class="w-100 dark-input"
                    [(ngModel)]="password"
                    type="password"
                    name="password"
                    placeholder="Password"
                >

                <app-submit-button class="w-full" [text]="'Submit'" [loading]="this.loading()"></app-submit-button>
            </form>
        </div>
    </div>
</div>
