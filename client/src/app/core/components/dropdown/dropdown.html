<label class="flex flex-col">
    @if (name) {
        <span class="text-sm p-1 text-text-muted">{{name}}</span>
    }
    <select (change)="onChange()" [(ngModel)]="value" name="conditions" class="dropdown">
        <option value="all">
            All
        </option>
        @for (item of list; track item) {
            <option [value]="item">{{item | titlecase}}</option>
        }
    </select>
</label>
